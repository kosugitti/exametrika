url: https://kosugitti.github.io/exametrika/

template:
  bootstrap: 5

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, tutorial_ja, github]
  components:
    tutorial_ja:
      text: "日本語チュートリアル"
      href: https://kosugitti.github.io/slides/BMS2025spring/docs/
    github:
      icon: fa-github
      href: https://github.com/kosugitti/exametrika
      aria-label: GitHub

articles:
  - title: Getting Started
    contents:
    - getting-started
  - title: Models
    contents:
    - irt
    - latent-class-rank
    - biclustering
    - network-models
  - title: 日本語
    contents:
    - guide-ja

reference:
  - title: Data Preparation
    desc: Functions for formatting and preparing test data
    contents:
    - dataFormat
    - longdataFormat

  - title: Descriptive Statistics
    desc: Item-level and test-level descriptive statistics
    contents:
    - TestStatistics
    - ItemStatistics
    - ItemReport
    - ScoreReport
    - StudentAnalysis

  - title: Classical Test Theory
    desc: CTT reliability and item analysis
    contents:
    - CTT
    - AlphaCoefficient
    - OmegaCoefficient
    - Dimensionality

  - title: Item Analysis
    desc: Item-level analysis functions
    contents:
    - ItemFit
    - ItemTotalCorr
    - ItemEntropy
    - ItemThreshold
    - ItemLift
    - ItemOdds
    - ITBiserial
    - InterItemAnalysis

  - title: Test-level Analysis
    desc: Test-level fit and response functions
